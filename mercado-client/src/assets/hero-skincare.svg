<svg xmlns="http://www.w3.org/2000/svg" width="340" height="360" viewBox="0 0 340 360" fill="none">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 140) rotate(90) scale(210 220)">
      <stop stop-color="#FFE9F1"/>
      <stop offset="1" stop-color="#F6F2FF"/>
    </radialGradient>
    <linearGradient id="g2" x1="70" y1="60" x2="270" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="340" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="340" height="360" rx="34" fill="url(#g1)"/>

  <!-- soft bubbles -->
  <g opacity="0.75">
    <circle cx="70" cy="85" r="12" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="98" cy="115" r="8" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="252" cy="92" r="10" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="268" cy="126" r="7" fill="#FFFFFF" opacity="0.45"/>
    <circle cx="86" cy="270" r="10" fill="#FFFFFF" opacity="0.45"/>
    <circle cx="260" cy="272" r="14" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- bottle -->
  <g filter="url(#shadow)">
    <path d="M150 84c0-10 8-18 18-18h4c10 0 18 8 18 18v12h-40V84Z" fill="#FFFFFF" opacity="0.92"/>
    <rect x="132" y="96" width="76" height="196" rx="22" fill="url(#g2)" stroke="#FFFFFF" stroke-opacity="0.8"/>
    <rect x="148" y="126" width="44" height="62" rx="14" fill="#F1E6FF" opacity="0.95"/>
    <path d="M154 174c10 10 22 10 32 0" stroke="#B58BFF" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <rect x="150" y="212" width="40" height="10" rx="5" fill="#FFB4D0" opacity="0.85"/>
  </g>

  <!-- sparkle -->
  <g opacity="0.85">
    <path d="M260 190l7 3 3 7-3 7-7 3-7-3-3-7 3-7 7-3Z" fill="#FFFFFF" opacity="0.9"/>
    <path d="M85 175l5 2 2 5-2 5-5 2-5-2-2-5 2-5 5-2Z" fill="#FFFFFF" opacity="0.8"/>
